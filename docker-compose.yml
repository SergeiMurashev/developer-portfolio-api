services:
  db:
    image: postgres:16-alpine
    container_name: developer-portfolio-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zephy_db}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_DB: ${POSTGRES_DB:-zephy_db}
    ports:
      - "${POSTGRES_HOST_PORT:-5441}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zephy_db -d zephy_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: developer-portfolio-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

  api:
    build: .
    container_name: developer-portfolio-api
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ${APP_NAME:-developer-portfolio-api}
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      LOG_DIR: ${LOG_DIR:-logs}
      DATA_DIR: ${DATA_DIR:-data}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DATABASE_URL: ${DATABASE_URL:-postgresql://zephy_db:1234@db:5432/zephy_db}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-5}
      OWNER_EMAIL: ${OWNER_EMAIL:-owner@example.com}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-portfolio@example.com}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-llama-3.1-8b-instant}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-12}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-5}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_HASH_SECRET: ${RATE_LIMIT_HASH_SECRET:-change-me}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started

volumes:
  postgres_data:
